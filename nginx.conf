# Rate limiting: 10 request/detik per IP, burst 20
limit_req_zone $binary_remote_addr zone=flarum_limit:10m rate=10r/s;

server {
    listen 80;
    root /var/www/flarum/public;
    index index.php index.html index.htm;

    # --- Keamanan Dasar ---
    server_tokens off;
    client_max_body_size 5M;

    # --- Security Headers ---
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # --- Rate Limiting ---
    limit_req zone=flarum_limit burst=20 nodelay;

    # --- Tangkap IP Asli dari Cloudflare ---
    set_real_ip_from 172.16.0.0/12;
    set_real_ip_from 192.168.0.0/16;
    set_real_ip_from 10.0.0.0/8;
    real_ip_header CF-Connecting-IP;

    # Routing Flarum
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Pass PHP scripts to PHP-FPM
    location ~ \.php$ {
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;

        # PENTING: Beritahu Flarum bahwa trafik berasal dari HTTPS
        fastcgi_param HTTPS 'on'; 
    }

    # Amankan file hidden & direktori sistem Flarum
    location ~ /\. {
        deny all;
    }
}