services:
  app:
    build: .
    container_name: flarum_app
    restart: unless-stopped
    volumes:
      - ./flarum-data:/var/www/flarum
    depends_on:
      db:
        condition: service_healthy
    networks:
      - flarum-net
      - flarum-internal
    security_opt:
      - no-new-privileges:true

  web:
    image: nginx:alpine
    container_name: flarum_web
    restart: unless-stopped
    volumes:
      - ./flarum-data:/var/www/flarum
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "127.0.0.1:8281:80" # Localhost only, accessed by VPS cloudflared
    depends_on:
      - app
    networks:
      - flarum-net
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /run

  db:
    image: mariadb:10.11
    container_name: flarum_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - flarum_db_data:/var/lib/mysql
    networks:
      - flarum-internal # DB only on internal network, no internet access
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

networks:
  flarum-net:
    driver: bridge
  flarum-internal:
    driver: bridge
    internal: true # No internet access — database isolation

volumes:
  flarum_db_data:
