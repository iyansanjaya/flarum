; Production PHP settings for Flarum
; Disable error display to prevent HTML output in JSON API responses
display_errors = Off
display_startup_errors = Off

; Log errors instead of displaying them
log_errors = On
error_log = /var/log/php_errors.log

; Exclude PHP 8.2 deprecation warnings (e.g. dynamic properties)
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT
